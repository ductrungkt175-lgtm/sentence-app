<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả học tập</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .back-button {
            background-color: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background-color: #555;
        }

        .results-summary {
            background-color: #222;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #333;
            text-align: center;
        }

        .summary-title {
            color: #1a73e8;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .summary-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4caf50;
        }

        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }

        .sentences-results {
            margin-bottom: 30px;
        }

        .result-item {
            background-color: #222;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .sentence-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sentence-en {
            font-size: 1.1rem;
            color: #1a73e8;
            flex: 1;
            min-width: 150px;
        }

        .level-change {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
        }

        .level-old, .level-new {
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .level-old {
            background: #333;
            color: #ccc;
        }

        .level-up .level-new {
            background: #1a331a;
            color: #4caf50;
        }

        .level-down .level-new {
            background: #331a1a;
            color: #f44336;
        }

        .level-same .level-new {
            background: #1a1a33;
            color: #2196f3;
        }

        .level-arrow {
            font-size: 1.2rem;
        }

        .round-results {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .round-result {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .round-perfect {
            background: #1a331a;
            color: #4caf50;
        }

        .round-imperfect {
            background: #331a1a;
            color: #f44336;
        }

        .word-details {
            margin: 10px 0;
        }

        .word-breakdown {
            text-align: center;
            font-size: 0.9rem;
        }

        .word-status {
            display: inline-block;
            padding: 2px 5px;
            margin: 1px;
            border-radius: 3px;
            font-size: 0.8rem;
            min-width: 20px;
            text-align: center;
        }

        .word-perfect {
            background: #1a331a;
            color: #4caf50;
        }

        .word-error {
            background: #331a1a;
            color: #f44336;
        }

        .word-untouched {
            background: #1a1a1a;
            color: #666;
        }

        /* Phần chỉnh sửa inline - style từ folder.html */
        .edit-mode .text-display {
            display: none;
        }

        .edit-inputs {
            display: none;
            width: 100%;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .edit-mode .edit-inputs {
            display: flex;
        }

        .edit-input {
            flex: 1;
            min-width: 120px;
            padding: 8px 10px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
        }

        .edit-en {
            border-left: 3px solid #1a73e8;
        }

        .edit-vn {
            border-left: 3px solid #4caf50;
        }

        .edit-po {
            border-left: 3px solid #ff9800;
        }

        .edit-actions {
            display: none;
            gap: 8px;
            margin-top: 6px;
        }

        .edit-mode .edit-actions {
            display: flex;
        }

        .save-edit-btn, .cancel-edit-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .save-edit-btn {
            background-color: #2ecc71;
            color: white;
        }

        .save-edit-btn:hover {
            background-color: #27ae60;
        }

        .cancel-edit-btn {
            background-color: #95a5a6;
            color: white;
        }

        .cancel-edit-btn:hover {
            background-color: #7f8c8d;
        }

        .word-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .edit-word-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .edit-word-btn:hover {
            background-color: #2980b9;
        }

        .edit-mode .word-actions {
            display: none;
        }

        .sentence-header-edit {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .actions {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .continue-button {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .continue-button:hover {
            background-color: #1976d2;
        }

        .retry-button {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .retry-button:hover {
            background-color: #f57c00;
        }

        .no-results {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .sentence-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .round-results {
                flex-direction: column;
                gap: 5px;
            }
            
            .summary-stats {
                gap: 10px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }

            .edit-input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kết quả học tập</h1>
            <a href="index.html" class="back-button">← Về trang chủ</a>
        </header>

        <div class="results-summary" id="resultsSummary">
            <!-- Tổng kết kết quả -->
        </div>

        <div class="sentences-results" id="sentencesResults">
            <!-- Kết quả chi tiết từng câu -->
        </div>

        <div class="actions">
            <button class="continue-button" id="continueButton">Tiếp tục học</button>
            <button class="retry-button" id="retryButton" style="display: none;">Luyện tập lại câu sai</button>
        </div>
    </div>

    <script>
        let resultsData = null;
        let updatedVocabularies = [];
        let imperfectSentences = [];
        // Lưu dữ liệu gốc của từng câu để edit
        let allSentencesData = [];

        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function calculateNextTime(level) {
            const now = Date.now();
            const minute = 60 * 1000;
            const hour = 60 * minute;
            const day = 24 * hour;
            
            const intervals = {
                1: 0,
                2: 15 * minute,
                3: 1 * day,
                4: 1 * day,
                5: 3 * day,
                6: 7 * day,
                7: 20 * day,
                8: 30 * day,
                9: 90 * day,
                10: 180 * day
            };
            
            return now + (level in intervals ? intervals[level] : intervals[10]);
        }

        function checkIfRoundPassed(roundData) {
            if (!roundData) return false;
            
            const { wordCount, errorCount } = roundData;
            let allowedErrors = Math.floor(wordCount / 5);
            
            return errorCount <= allowedErrors;
        }

        function processResults() {
            const resultsParam = getUrlParam('results');
            if (!resultsParam) return;

            try {
                resultsData = JSON.parse(decodeURIComponent(resultsParam));
                const vocabularies = JSON.parse(localStorage.getItem('vocabularies') || '[]');
                const now = Date.now();
                
                let totalUp = 0;
                let totalDown = 0;
                let totalSame = 0;
                imperfectSentences = [];

                resultsData.processedResults = resultsData.sentences.map((sentence, index) => {
                    const round1Data = resultsData.roundResults[1][index];
                    const round2Data = resultsData.roundResults[2][index];
                    
                    // Tìm index trong vocabularies (lưu để edit)
                    let vocabIndex = vocabularies.findIndex(vocab => 
                        (vocab.en === sentence.en || vocab.w === sentence.en) &&
                        (vocab.vn === sentence.vn || vocab.m === sentence.vn)
                    );

                    let oldLevel = 0;
                    let newLevel = 0;
                    let levelChange = 'same';
                    let round1Passed = false;
                    let round2Passed = false;

                    if (vocabIndex !== -1) {
                        oldLevel = vocabularies[vocabIndex].l || 0;
                        
                        round1Passed = checkIfRoundPassed(round1Data);
                        round2Passed = checkIfRoundPassed(round2Data);
                        
                        if (round1Passed && round2Passed) {
                            newLevel = oldLevel + 1;
                            levelChange = 'up';
                            totalUp++;
                        } else {
                            newLevel = 1;
                            if (oldLevel > 1) {
                                levelChange = 'down';
                                totalDown++;
                            } else {
                                levelChange = 'same';
                                totalSame++;
                            }
                            
                            imperfectSentences.push(sentence);
                        }

                        vocabularies[vocabIndex].l = newLevel;
                        vocabularies[vocabIndex].lt = now;
                        vocabularies[vocabIndex].nt = calculateNextTime(newLevel);
                    }

                    // Lưu thông tin để sử dụng cho edit sau này
                    const vocabItem = vocabIndex !== -1 ? vocabularies[vocabIndex] : null;

                    return {
                        sentence: sentence,
                        round1Data: round1Data,
                        round2Data: round2Data,
                        round1Passed: round1Passed,
                        round2Passed: round2Passed,
                        oldLevel: oldLevel,
                        newLevel: newLevel,
                        levelChange: levelChange,
                        vocabIndex: vocabIndex,
                        vocabItem: vocabItem
                    };
                });

                updatedVocabularies = vocabularies;
                localStorage.setItem('vocabularies', JSON.stringify(vocabularies));

                resultsData.summary = {
                    total: resultsData.sentences.length,
                    up: totalUp,
                    down: totalDown,
                    same: totalSame,
                    imperfect: imperfectSentences.length
                };

                allSentencesData = resultsData.processedResults;

            } catch (error) {
                console.error('Lỗi xử lý kết quả:', error);
            }
        }

        function displaySummary() {
            const summaryElement = document.getElementById('resultsSummary');
            
            if (!resultsData || !resultsData.summary) {
                summaryElement.innerHTML = '<div class="no-results">Không có kết quả để hiển thị</div>';
                return;
            }

            const { total, up, down, same, imperfect } = resultsData.summary;

            summaryElement.innerHTML = `
                <div class="summary-title">Tổng kết phiên học</div>
                <div class="summary-stats">
                    <div class="stat-item">
                        <div class="stat-value">${total}</div>
                        <div class="stat-label">Tổng câu</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color: #4caf50">${up}</div>
                        <div class="stat-label">Lên level</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color: #f44336">${down}</div>
                        <div class="stat-label">Xuống level</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color: #2196f3">${same}</div>
                        <div class="stat-label">Giữ nguyên</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color: #ff9800">${imperfect}</div>
                        <div class="stat-label">Cần luyện lại</div>
                    </div>
                </div>
            `;
        }

        function getWordDetails(roundData) {
            if (!roundData || !roundData.wordResults) return '';
            
            let html = '<div class="word-breakdown">';
            roundData.wordResults.forEach((result, index) => {
                let statusClass = 'word-untouched';
                let statusText = '?';
                
                if (result === 1) {
                    statusClass = 'word-perfect';
                    statusText = '✓';
                } else if (result === 2 || result === 3) {
                    statusClass = 'word-error';
                    statusText = '✗';
                }
                
                html += `<span class="word-status ${statusClass}" title="Từ ${index + 1}">${statusText}</span>`;
            });
            html += '</div>';
            
            return html;
        }

        // --- Các hàm xử lý chỉnh sửa inline ---
        function enableEditMode(button) {
            const resultItem = button.closest('.result-item');
            resultItem.classList.add('edit-mode');
            
            // Lấy giá trị hiện tại từ dữ liệu đã lưu
            const index = parseInt(resultItem.dataset.index);
            const data = allSentencesData[index];
            if (!data) return;
            
            // Đổ dữ liệu hiện tại vào các input
            const enInput = resultItem.querySelector('.edit-en');
            const vnInput = resultItem.querySelector('.edit-vn');
            const poInput = resultItem.querySelector('.edit-po');
            
            // Lấy từ localStorage để có dữ liệu mới nhất (có thể đã sửa trước đó)
            const vocabularies = JSON.parse(localStorage.getItem('vocabularies') || '[]');
            let currentVocab = null;
            if (data.vocabIndex !== -1 && data.vocabIndex < vocabularies.length) {
                currentVocab = vocabularies[data.vocabIndex];
            }
            
            if (currentVocab) {
                enInput.value = currentVocab.en || data.sentence.en || '';
                vnInput.value = currentVocab.vn || data.sentence.vn || '';
                poInput.value = currentVocab.po || data.sentence.po || '';
                // Lưu giá trị gốc để cancel
                resultItem.dataset.originalEn = enInput.value;
                resultItem.dataset.originalVn = vnInput.value;
                resultItem.dataset.originalPo = poInput.value;
            } else {
                // Fallback
                enInput.value = data.sentence.en || '';
                vnInput.value = data.sentence.vn || '';
                poInput.value = data.sentence.po || '';
                resultItem.dataset.originalEn = enInput.value;
                resultItem.dataset.originalVn = vnInput.value;
                resultItem.dataset.originalPo = poInput.value;
            }
        }

        function saveEdit(button) {
            const resultItem = button.closest('.result-item');
            const index = parseInt(resultItem.dataset.index);
            const data = allSentencesData[index];
            if (!data) return;

            const newEn = resultItem.querySelector('.edit-en').value.trim();
            const newVn = resultItem.querySelector('.edit-vn').value.trim();
            const newPo = resultItem.querySelector('.edit-po').value.trim();

            if (!newEn || !newVn) {
                alert('Vui lòng nhập đầy đủ câu tiếng Anh và nghĩa tiếng Việt');
                return;
            }

            // Cập nhật vào localStorage
            let vocabularies = JSON.parse(localStorage.getItem('vocabularies') || '[]');
            let found = false;
            // Nếu có vocabIndex thì cập nhật trực tiếp
            if (data.vocabIndex !== -1 && data.vocabIndex < vocabularies.length) {
                const target = vocabularies[data.vocabIndex];
                // Kiểm tra trùng với câu khác (trừ chính nó)
                const duplicate = vocabularies.some((v, idx) => 
                    idx !== data.vocabIndex && 
                    v.s === target.s && 
                    v.en === newEn && 
                    v.vn === newVn
                );
                if (duplicate) {
                    alert('Câu này đã tồn tại trong cùng thư mục!');
                    return;
                }
                target.en = newEn;
                target.vn = newVn;
                target.po = newPo;
                found = true;
            } else {
                // Trường hợp không tìm thấy index (có thể đã bị xóa hoặc lỗi) - tìm bằng en, vn cũ
                const oldEn = data.sentence.en || '';
                const oldVn = data.sentence.vn || '';
                for (let i = 0; i < vocabularies.length; i++) {
                    if (vocabularies[i].en === oldEn && vocabularies[i].vn === oldVn && vocabularies[i].s === data.sentence.s) {
                        const duplicate = vocabularies.some((v, idx) => 
                            idx !== i && 
                            v.s === vocabularies[i].s && 
                            v.en === newEn && 
                            v.vn === newVn
                        );
                        if (duplicate) {
                            alert('Câu này đã tồn tại trong cùng thư mục!');
                            return;
                        }
                        vocabularies[i].en = newEn;
                        vocabularies[i].vn = newVn;
                        vocabularies[i].po = newPo;
                        found = true;
                        break;
                    }
                }
            }

            if (!found) {
                alert('Không tìm thấy câu này trong dữ liệu để cập nhật.');
                return;
            }

            localStorage.setItem('vocabularies', JSON.stringify(vocabularies));
            
            // Cập nhật lại dữ liệu trong allSentencesData và hiển thị
            // Cập nhật cả sentence để hiển thị
            data.sentence.en = newEn;
            data.sentence.vn = newVn;
            data.sentence.po = newPo;
            // Cập nhật vocabItem
            if (data.vocabIndex !== -1 && data.vocabIndex < vocabularies.length) {
                data.vocabItem = vocabularies[data.vocabIndex];
            }
            
            resultItem.classList.remove('edit-mode');
            // Cập nhật lại giao diện
            renderDetailedResults();
            alert('Đã cập nhật câu!');
        }

        function cancelEdit(button) {
            const resultItem = button.closest('.result-item');
            const originalEn = resultItem.dataset.originalEn || '';
            const originalVn = resultItem.dataset.originalVn || '';
            const originalPo = resultItem.dataset.originalPo || '';
            
            // Khôi phục giá trị input
            resultItem.querySelector('.edit-en').value = originalEn;
            resultItem.querySelector('.edit-vn').value = originalVn;
            resultItem.querySelector('.edit-po').value = originalPo;
            
            resultItem.classList.remove('edit-mode');
        }

        // Hàm render lại danh sách kết quả chi tiết với hỗ trợ edit
        function renderDetailedResults() {
            const resultsElement = document.getElementById('sentencesResults');
            
            if (!allSentencesData || allSentencesData.length === 0) {
                resultsElement.innerHTML = '<div class="no-results">Không có kết quả chi tiết</div>';
                return;
            }

            resultsElement.innerHTML = allSentencesData.map((result, index) => {
                const levelClass = `level-${result.levelChange}`;
                const round1Class = result.round1Passed ? 'round-perfect' : 'round-imperfect';
                const round2Class = result.round2Passed ? 'round-perfect' : 'round-imperfect';
                
                const wordDetails1 = getWordDetails(result.round1Data);
                const wordDetails2 = getWordDetails(result.round2Data);
                
                const wordCount = result.round2Data ? result.round2Data.wordCount : 0;
                let allowedErrors = Math.floor(wordCount / 5);

                // Lấy dữ liệu hiện tại từ localStorage để hiển thị đúng nếu đã sửa
                let currentEn = result.sentence.en || '';
                let currentVn = result.sentence.vn || '';
                let currentPo = result.sentence.po || '';
                if (result.vocabIndex !== -1) {
                    const vocabularies = JSON.parse(localStorage.getItem('vocabularies') || '[]');
                    if (result.vocabIndex < vocabularies.length) {
                        const v = vocabularies[result.vocabIndex];
                        currentEn = v.en || currentEn;
                        currentVn = v.vn || currentVn;
                        currentPo = v.po || currentPo;
                    }
                }
                
                return `
                    <div class="result-item" data-index="${index}">
                        <div class="sentence-header">
                            <div class="sentence-header-edit">
                                <div class="text-display" style="flex:1;">
                                    <div class="sentence-en">${currentEn}</div>
                                </div>
                                <div class="word-actions">
                                    <button class="edit-word-btn" onclick="enableEditMode(this)">Sửa</button>
                                </div>
                            </div>
                            <div class="level-change ${levelClass}">
                                <span class="level-old">Lv${result.oldLevel}</span>
                                <span class="level-arrow">→</span>
                                <span class="level-new">Lv${result.newLevel}</span>
                            </div>
                        </div>

                        <!-- Phần edit inputs -->
                        <div class="edit-inputs">
                            <input type="text" class="edit-input edit-en" placeholder="Câu tiếng Anh">
                            <input type="text" class="edit-input edit-vn" placeholder="Nghĩa tiếng Việt">
                            <input type="text" class="edit-input edit-po" placeholder="Phiên âm (tùy chọn)">
                        </div>
                        <div class="edit-actions">
                            <button class="save-edit-btn" onclick="saveEdit(this)">Lưu</button>
                            <button class="cancel-edit-btn" onclick="cancelEdit(this)">Hủy</button>
                        </div>

                        <div class="word-details">
                            <div><strong>Vòng 1:</strong> ${wordDetails1}</div>
                            <div><strong>Vòng 2:</strong> ${wordDetails2}</div>
                            <div style="margin-top: 5px; font-size: 0.8rem; color: #888;">
                                Cho phép sai: ${allowedErrors} từ (${wordCount} từ, tỷ lệ 5:1)
                            </div>
                        </div>
                        
                        <div class="round-results">
                            <div class="round-result ${round1Class}">
                                Vòng 1: ${result.round1Passed ? '✅ Đạt' : '❌ Chưa đạt'} 
                                (${result.round1Data ? result.round1Data.perfectCount + '/' + result.round1Data.wordCount + ' từ đúng' : 'N/A'})
                            </div>
                            <div class="round-result ${round2Class}">
                                Vòng 2: ${result.round2Passed ? '✅ Đạt' : '❌ Chưa đạt'}
                                (${result.round2Data ? result.round2Data.perfectCount + '/' + result.round2Data.wordCount + ' từ đúng' : 'N/A'})
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function displayDetailedResults() {
            renderDetailedResults();
        }

        function continueLearning() {
            window.location.href = 'choose.html';
        }

        function retryImperfectSentences() {
            if (imperfectSentences.length > 0) {
                const encodedSentences = encodeURIComponent(JSON.stringify(imperfectSentences));
                window.location.href = `typwr.html?sentences=${encodedSentences}`;
            } else {
                continueLearning();
            }
        }

        function init() {
            processResults();
            displaySummary();
            displayDetailedResults();

            if (imperfectSentences.length > 0) {
                document.getElementById('retryButton').style.display = 'block';
            }

            document.getElementById('continueButton').addEventListener('click', continueLearning);
            document.getElementById('retryButton').addEventListener('click', retryImperfectSentences);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
